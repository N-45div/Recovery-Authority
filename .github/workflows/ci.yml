name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check TypeScript
        run: bun run check

      - name: Run unit tests
        run: bun test

      - name: Rebuild committed plugin artifacts
        run: bun run build

      - name: Verify committed artifacts are current
        run: git diff --exit-code -- dist

      - name: Verify packaged MCP and hook boundaries
        run: |
          bun run test:mcp
          bun run test:hook
          bun run test:bundle

      - name: Test Rust workspace
        run: cargo test --workspace --locked
